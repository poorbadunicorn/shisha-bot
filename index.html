<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>Забивка — подбор миксов</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg:#0f1115; --card:#191c23; --card2:#22262f; --text:#f2f3f5;
    --hint:#8b90a0; --accent:#f0a04b; --accent2:#5aa9e6; --line:#2c3039;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    margin:0;background:var(--bg);color:var(--text);
    font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    padding-bottom:80px;
  }
  .wrap{padding:16px;max-width:560px;margin:0 auto}
  h1{font-size:22px;margin:4px 0 2px}
  .sub{color:var(--hint);font-size:13px;margin-bottom:18px}
  .sec-title{font-size:13px;text-transform:uppercase;letter-spacing:.06em;color:var(--hint);margin:22px 0 10px}

  .grid{display:grid;gap:10px}
  .grid-3{grid-template-columns:repeat(3,1fr)}
  .grid-2{grid-template-columns:repeat(2,1fr)}

  .opt{
    background:var(--card);border:1.5px solid var(--line);border-radius:14px;
    padding:14px 10px;text-align:center;cursor:pointer;transition:.15s;
  }
  .opt:active{transform:scale(.97)}
  .opt.on{border-color:var(--accent);background:#2a2118}
  .opt .ico{font-size:22px;display:block;margin-bottom:6px}
  .opt .lbl{font-size:13px;font-weight:600}
  .opt .cap{font-size:11px;color:var(--hint);margin-top:3px}

  .btn{
    display:block;width:100%;border:0;border-radius:14px;padding:15px;
    font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;
    background:var(--accent);color:#1a1206;
  }
  .btn:disabled{opacity:.35;cursor:default}
  .btn.ghost{background:var(--card);color:var(--text);border:1.5px solid var(--line);font-weight:600}
  .btn:active{transform:scale(.985)}

  .mix{
    background:var(--card);border-radius:16px;padding:14px;margin-bottom:10px;
    display:flex;gap:12px;align-items:flex-start;cursor:pointer;border:1.5px solid transparent;
  }
  .mix:active{border-color:var(--line)}
  .mix .e{font-size:28px;line-height:1}
  .mix .n{font-weight:700;font-size:15px}
  .mix .s{color:var(--hint);font-size:13px;margin-top:2px}
  .fav{margin-left:auto;font-size:19px;padding:2px 4px;opacity:.35}
  .fav.on{opacity:1}

  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .chip{background:var(--card2);color:var(--hint);border-radius:20px;padding:4px 10px;font-size:11px}
  .chip.time{background:#2a2118;color:var(--accent);font-weight:600}

  .dur{display:flex;align-items:center;gap:12px;background:#2a2118;border:1px solid #4a3a22;
       border-radius:14px;padding:12px 16px;margin-top:12px}
  .dur-ic{font-size:24px}
  .dur-lbl{font-size:11px;color:var(--hint);text-transform:uppercase;letter-spacing:.05em}
  .dur-val{font-size:18px;font-weight:800;color:var(--accent)}

  .acc{background:var(--card);border-radius:14px;margin-bottom:8px;overflow:hidden}
  .acc-h{display:flex;align-items:center;gap:10px;padding:14px;cursor:pointer}
  .acc-h .ae{font-size:22px}
  .acc-h .an{font-weight:700;font-size:15px}
  .acc-h .at{font-size:11px;color:var(--hint);margin-top:1px}
  .acc-h .arr{margin-left:auto;color:var(--hint);transition:.2s;font-size:13px}
  .acc.open .arr{transform:rotate(90deg)}
  .acc-b{max-height:0;overflow:hidden;transition:max-height .25s ease}
  .acc-b-in{padding:0 14px 14px}
  .acc-b .kv{align-items:flex-start}
  .acc-b .kv b{color:var(--accent);min-width:96px}
  .acc-h .thumb{width:44px;height:34px;flex-shrink:0}
  .acc-h .thumb svg{width:100%;height:100%;display:block}
  .bowl-img{background:#14161c;border-radius:12px;padding:8px;margin-bottom:12px;text-align:center}
  .bowl-img svg{width:150px;height:112px}
  .bowl-img .cap{font-size:10px;color:var(--hint);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}

  .card{background:var(--card);border-radius:16px;padding:16px;margin-bottom:12px}
  .row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line)}
  .row:last-child{border-bottom:0}
  .row .brand{font-size:11px;color:var(--hint);text-transform:uppercase;letter-spacing:.04em}
  .row .flav{font-weight:600;font-size:14px;margin-top:2px}
  .pct{font-weight:800;font-size:17px;color:var(--accent);white-space:nowrap;margin-left:12px}
  .bar{height:6px;border-radius:4px;background:var(--card2);overflow:hidden;display:flex;margin:14px 0 4px}
  .bar i{display:block;height:100%}

  .kv{display:flex;gap:10px;padding:9px 0;font-size:13px;border-bottom:1px solid var(--line)}
  .kv:last-child{border-bottom:0}
  .kv b{color:var(--hint);font-weight:500;min-width:78px;flex-shrink:0}

  .back{background:none;border:0;color:var(--accent2);font-size:14px;padding:0 0 12px;cursor:pointer;font-family:inherit}
  .empty{text-align:center;color:var(--hint);padding:44px 20px;font-size:14px}

  input[type=text]{
    width:100%;background:var(--card);border:1.5px solid var(--line);border-radius:12px;
    padding:13px 14px;color:var(--text);font-size:15px;font-family:inherit;outline:none;
  }
  input[type=text]:focus{border-color:var(--accent)}

  .tabbar{
    position:fixed;left:0;right:0;bottom:0;background:#13161c;border-top:1px solid var(--line);
    display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:10;
  }
  .tab{flex:1;background:none;border:0;padding:10px 4px 12px;color:var(--hint);font-size:10px;cursor:pointer;font-family:inherit}
  .tab .ti{display:block;font-size:19px;margin-bottom:2px;filter:grayscale(1);opacity:.6}
  .tab.on{color:var(--accent)}
  .tab.on .ti{filter:none;opacity:1}
  .hidden{display:none!important}
</style>
</head>
<body>

<!-- ============ HOME ============ -->
<div id="v-home" class="wrap">
  <h1>Собери свой кальян</h1>
  <div class="sub">Выбери крепость и вкусовой профиль — подберём микс и пропорции</div>

  <div class="sec-title">Крепость</div>
  <div class="grid grid-3" id="strengthBox"></div>

  <div class="sec-title">Вкусовой профиль</div>
  <div class="grid grid-2" id="profileBox"></div>

  <div style="margin-top:22px"><button class="btn" id="goBtn" disabled>Подобрать микс</button></div>
  <div style="margin-top:10px"><button class="btn ghost" id="randBtn">🎲 Удиви меня</button></div>
</div>

<!-- ============ LIST ============ -->
<div id="v-list" class="wrap hidden">
  <button class="back" id="listBack">‹ Назад</button>
  <h1 id="listTitle">Миксы</h1>
  <div class="sub" id="listSub"></div>
  <div id="listBox"></div>
</div>

<!-- ============ DETAIL ============ -->
<div id="v-detail" class="wrap hidden">
  <button class="back" id="detBack">‹ Назад</button>
  <div id="detBox"></div>
</div>

<!-- ============ FAVORITES ============ -->
<div id="v-fav" class="wrap hidden">
  <h1>Избранное</h1>
  <div class="sub">Сохранённые миксы</div>
  <div id="favBox"></div>
</div>

<!-- ============ SEARCH BY TOBACCO ============ -->
<div id="v-search" class="wrap hidden">
  <h1>Что можно забить</h1>
  <div class="sub">Отметь табаки, которые есть в наличии</div>
  <input type="text" id="brandFilter" placeholder="Поиск по бренду или вкусу…">
  <div style="margin-top:12px" id="stockBox"></div>
  <div class="sec-title">Доступно сейчас</div>
  <div id="stockResult"></div>
</div>

<!-- ============ GUIDE / СПРАВКА ============ -->
<div id="v-guide" class="wrap hidden">
  <h1>Справка</h1>
  <div class="sub">Чаши и методология забивки</div>
  <div class="sec-title">Типы чаш</div>
  <div id="bowlBox"></div>
  <div class="sec-title">Частые вопросы</div>
  <div id="tipsBox"></div>
</div>

<div class="tabbar">
  <button class="tab on" data-tab="home"><span class="ti">🎯</span>Подбор</button>
  <button class="tab" data-tab="search"><span class="ti">🔍</span>По&nbsp;табаку</button>
  <button class="tab" data-tab="fav"><span class="ti">⭐</span>Избранное</button>
  <button class="tab" data-tab="guide"><span class="ti">📖</span>Справка</button>
</div>

<script src="mixes.js"></script>
<script>
(function(){
  "use strict";

  var tg = window.Telegram && window.Telegram.WebApp;
  if (tg) { tg.ready(); tg.expand(); try{ tg.setHeaderColor('#0f1115'); }catch(e){} }
  function haptic(t){ try{ tg.HapticFeedback.impactOccurred(t||'light'); }catch(e){} }

  var STRENGTHS = [
    { id:"light",  ico:"🍃", lbl:"Лёгкая",  cap:"новичкам" },
    { id:"medium", ico:"🔥", lbl:"Средняя", cap:"универсал" },
    { id:"strong", ico:"💀", lbl:"Крепкая", cap:"для опытных" }
  ];
  var PROFILES = [
    { id:"sour",      ico:"🍋", lbl:"Кислый",       cap:"цитрус, терпкость" },
    { id:"sweet",     ico:"🍯", lbl:"Сладкий",      cap:"фрукты, мёд" },
    { id:"sourSweet", ico:"🍒", lbl:"Кисло-сладкий",cap:"ягоды, баланс" },
    { id:"neutral",   ico:"🍵", lbl:"Нейтральный",  cap:"чай, травы" },
    { id:"fresh",     ico:"❄️", lbl:"Свежий",       cap:"мята, холодок" },
    { id:"dessert",   ico:"🍰", lbl:"Десертный",    cap:"крем, выпечка" },
    { id:"spicy",     ico:"🌶", lbl:"Пряный",       cap:"корица, специи" }
  ];
  var COLORS = ["#f0a04b","#5aa9e6","#78c091","#d67ab1","#e6c15a","#9b8ade"];

  var sel = { strength:null, profile:null };
  var stock = {};   // brand -> true
  var favs  = load("hk_favs", []);
  var view  = "home";
  var backTo = "list";

  function load(k,d){ try{ return JSON.parse(localStorage.getItem(k)) || d; }catch(e){ return d; } }
  function save(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
  function $(id){ return document.getElementById(id); }
  function esc(s){ return String(s).replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
  function pLabel(id){ for(var i=0;i<PROFILES.length;i++) if(PROFILES[i].id===id) return PROFILES[i].lbl; return id; }
  function sLabel(id){ for(var i=0;i<STRENGTHS.length;i++) if(STRENGTHS[i].id===id) return STRENGTHS[i].lbl; return id; }
  function byId(id){ for(var i=0;i<MIXES.length;i++) if(MIXES[i].id===id) return MIXES[i]; return null; }

  // ---------- render option buttons ----------
  function renderOpts(box, items, key){
    box.innerHTML = items.map(function(it){
      return '<div class="opt" data-v="'+it.id+'">'
        + '<span class="ico">'+it.ico+'</span>'
        + '<span class="lbl">'+it.lbl+'</span>'
        + '<div class="cap">'+it.cap+'</div></div>';
    }).join("");
    box.addEventListener("click", function(e){
      var el = e.target.closest(".opt"); if(!el) return;
      haptic();
      sel[key] = (sel[key] === el.dataset.v) ? null : el.dataset.v;
      Array.prototype.forEach.call(box.children, function(c){
        c.classList.toggle("on", c.dataset.v === sel[key]);
      });
      $("goBtn").disabled = !(sel.strength && sel.profile);
    });
  }
  renderOpts($("strengthBox"), STRENGTHS, "strength");
  renderOpts($("profileBox"), PROFILES, "profile");

  // ---------- mix card in list ----------
  function mixRow(m){
    var isFav = favs.indexOf(m.id) > -1;
    return '<div class="mix" data-id="'+m.id+'">'
      + '<span class="e">'+m.emoji+'</span>'
      + '<div style="flex:1;min-width:0">'
        + '<div class="n">'+esc(m.name)+'</div>'
        + '<div class="s">'+esc(m.short)+'</div>'
        + '<div class="chips"><span class="chip time">⏱ '+esc(m.duration||"")+'</span>'+ m.tags.map(function(t){return '<span class="chip">'+esc(t)+'</span>';}).join("") +'</div>'
      + '</div>'
      + '<span class="fav'+(isFav?' on':'')+'" data-fav="'+m.id+'">'+(isFav?'★':'☆')+'</span>'
      + '</div>';
  }

  function bindList(box, from){
    box.onclick = function(e){
      var f = e.target.closest("[data-fav]");
      if(f){ e.stopPropagation(); toggleFav(f.dataset.fav); return; }
      var row = e.target.closest(".mix");
      if(row){ backTo = from; openDetail(row.dataset.id); }
    };
  }

  function toggleFav(id){
    haptic('medium');
    var i = favs.indexOf(id);
    if(i > -1) favs.splice(i,1); else favs.push(id);
    save("hk_favs", favs);
    refreshCurrent();
  }

  // ---------- filtering ----------
  function match(m){
    return m.strength === sel.strength && m.profile.indexOf(sel.profile) > -1;
  }

  function showList(){
    var found = MIXES.filter(match);
    // фолбэк: если по точному совпадению пусто — расширяем по крепости
    var fallback = false;
    if(!found.length){
      found = MIXES.filter(function(m){ return m.strength === sel.strength; });
      fallback = true;
    }
    $("listTitle").textContent = sLabel(sel.strength) + " · " + pLabel(sel.profile);
    $("listSub").textContent = fallback
      ? "Точных совпадений нет — вот всё в этой крепости (" + found.length + ")"
      : "Найдено миксов: " + found.length;
    $("listBox").innerHTML = found.map(mixRow).join("");
    bindList($("listBox"), "list");
    go("list");
  }

  // ---------- detail ----------
  function openDetail(id){
    var m = byId(id); if(!m) return;
    haptic();
    var total = m.recipe.reduce(function(a,r){ return a + r.parts; }, 0);
    var isFav = favs.indexOf(m.id) > -1;

    var bar = '<div class="bar">' + m.recipe.map(function(r,i){
      return '<i style="width:'+(r.parts/total*100)+'%;background:'+COLORS[i%COLORS.length]+'"></i>';
    }).join("") + '</div>';

    var rows = m.recipe.map(function(r,i){
      return '<div class="row"><div>'
        + '<div class="brand" style="color:'+COLORS[i%COLORS.length]+'">'+esc(r.brand)+'</div>'
        + '<div class="flav">'+esc(r.flavor)+'</div></div>'
        + '<div class="pct">'+Math.round(r.parts/total*100)+'%</div></div>';
    }).join("");

    $("detBox").innerHTML =
      '<div style="display:flex;align-items:center;gap:12px;margin-bottom:6px">'
        + '<span style="font-size:38px">'+m.emoji+'</span>'
        + '<div style="flex:1"><h1 style="margin:0">'+esc(m.name)+'</h1>'
        + '<div class="sub" style="margin:2px 0 0">'+esc(m.short)+'</div></div>'
        + '<button class="fav'+(isFav?' on':'')+'" data-fav="'+m.id+'" style="background:none;border:0;font-size:26px;cursor:pointer;color:var(--accent)">'+(isFav?'★':'☆')+'</button>'
      + '</div>'
      + '<div class="chips" style="margin-bottom:14px">'
        + '<span class="chip">'+sLabel(m.strength)+'</span>'
        + m.profile.map(function(p){return '<span class="chip">'+pLabel(p)+'</span>';}).join("")
        + m.tags.map(function(t){return '<span class="chip">'+esc(t)+'</span>';}).join("")
      + '</div>'
      + '<div class="card" style="line-height:1.55">'+esc(m.desc)+'</div>'
      + '<div class="dur"><span class="dur-ic">⏱</span><div><div class="dur-lbl">Курится примерно</div><div class="dur-val">'+esc(m.duration||"—")+'</div></div></div>'
      + '<div class="sec-title" style="margin-top:18px">Состав и пропорции</div>'
      + '<div class="card">'+bar+rows+'</div>'
      + '<div class="sec-title">Как забивать</div>'
      + '<div class="card">'
        + '<div class="kv"><b>Чаша</b><span>'+esc(m.bowl)+'</span></div>'
        + '<div class="kv"><b>Жар</b><span>'+esc(m.heat)+'</span></div>'
        + '<div class="kv"><b>Время</b><span>'+esc(m.duration||"—")+'</span></div>'
        + '<div class="kv"><b>Совет</b><span>'+esc(m.note)+'</span></div>'
      + '</div>';

    $("detBox").onclick = function(e){
      var f = e.target.closest("[data-fav]");
      if(f) toggleFav(f.dataset.fav);
    };
    go("detail");
  }

  // ---------- favorites ----------
  function showFav(){
    var list = favs.map(byId).filter(Boolean);
    $("favBox").innerHTML = list.length
      ? list.map(mixRow).join("")
      : '<div class="empty">Пока пусто.<br>Жми ☆ на любом миксе, чтобы сохранить.</div>';
    bindList($("favBox"), "fav");
  }

  // ---------- search by tobacco ----------
  function allBrands(){
    var seen = {}, out = [];
    MIXES.forEach(function(m){ m.recipe.forEach(function(r){
      if(!seen[r.brand]){ seen[r.brand] = 1; out.push(r.brand); }
    });});
    return out.sort();
  }

  function showSearch(){
    var q = $("brandFilter").value.trim().toLowerCase();
    var brands = allBrands().filter(function(b){
      if(!q) return true;
      if(b.toLowerCase().indexOf(q) > -1) return true;
      // ищем и по вкусам этого бренда
      return MIXES.some(function(m){ return m.recipe.some(function(r){
        return r.brand === b && r.flavor.toLowerCase().indexOf(q) > -1;
      });});
    });

    $("stockBox").innerHTML = '<div class="grid grid-2">' + brands.map(function(b){
      return '<div class="opt'+(stock[b]?' on':'')+'" data-b="'+esc(b)+'" style="padding:11px 8px">'
        + '<span class="lbl">'+esc(b)+'</span></div>';
    }).join("") + '</div>';

    var picked = Object.keys(stock).filter(function(k){ return stock[k]; });
    if(!picked.length){
      $("stockResult").innerHTML = '<div class="empty">Отметь хотя бы один бренд выше.</div>';
      return;
    }
    var ready = [], partial = [];
    MIXES.forEach(function(m){
      var have = m.recipe.filter(function(r){ return stock[r.brand]; }).length;
      if(have === m.recipe.length) ready.push(m);
      else if(have >= m.recipe.length - 1 && have > 0) partial.push(m);
    });

    var html = "";
    html += ready.length
      ? ready.map(mixRow).join("")
      : '<div class="empty" style="padding:20px">Полных совпадений нет.</div>';
    if(partial.length){
      html += '<div class="sec-title">Не хватает одного табака</div>' + partial.map(mixRow).join("");
    }
    $("stockResult").innerHTML = html;
    bindList($("stockResult"), "search");
  }

  $("stockBox").addEventListener("click", function(e){
    var el = e.target.closest("[data-b]"); if(!el) return;
    haptic();
    var b = el.dataset.b;
    stock[b] = !stock[b];
    save("hk_stock", stock);
    showSearch();
  });
  $("brandFilter").addEventListener("input", showSearch);
  stock = load("hk_stock", {});

  // ---------- guide / справка ----------
  var guideBuilt = false;
  function showGuide(){
    if(guideBuilt) return;
    var bowls = window.BOWLS || [];
    $("bowlBox").innerHTML = bowls.map(function(b,i){
      var head = b.img
        ? '<span class="thumb">'+b.img+'</span>'
        : '<span class="ae">'+b.emoji+'</span>';
      var pic = b.img
        ? '<div class="bowl-img">'+b.img+'<div class="cap">схема · вид в разрезе</div></div>'
        : '';
      return '<div class="acc" data-acc>'
        + '<div class="acc-h">'+head
          + '<div><div class="an">'+esc(b.name)+'</div><div class="at">'+esc(b.tag)+'</div></div>'
          + '<span class="arr">▶</span></div>'
        + '<div class="acc-b"><div class="acc-b-in">'
          + pic
          + '<div class="kv"><b>Для чего</b><span>'+esc(b.forWhat)+'</span></div>'
          + '<div class="kv"><b>Забивка</b><span>'+esc(b.pack)+'</span></div>'
          + '<div class="kv"><b>Жар</b><span>'+esc(b.heat)+'</span></div>'
          + '<div class="kv"><b>Совет</b><span>'+esc(b.tip)+'</span></div>'
        + '</div></div></div>';
    }).join("");

    var tips = window.TIPS || [];
    $("tipsBox").innerHTML = tips.map(function(t){
      return '<div class="acc" data-acc>'
        + '<div class="acc-h"><span class="ae">💬</span>'
          + '<div><div class="an">'+esc(t.q)+'</div></div>'
          + '<span class="arr">▶</span></div>'
        + '<div class="acc-b"><div class="acc-b-in" style="padding-top:0">'
          + '<div style="color:#c9ccd3;line-height:1.5">'+esc(t.a)+'</div>'
        + '</div></div></div>';
    }).join("");

    function bindAcc(box){
      box.addEventListener("click", function(e){
        var h = e.target.closest(".acc-h"); if(!h) return;
        var acc = h.parentElement; haptic();
        var body = acc.querySelector(".acc-b");
        var isOpen = acc.classList.contains("open");
        if(isOpen){ acc.classList.remove("open"); body.style.maxHeight = "0"; }
        else { acc.classList.add("open"); body.style.maxHeight = body.firstElementChild.scrollHeight + 20 + "px"; }
      });
    }
    bindAcc($("bowlBox")); bindAcc($("tipsBox"));
    guideBuilt = true;
  }

  // ---------- navigation ----------
  var VIEWS = ["home","list","detail","fav","search","guide"];
  function go(v){
    view = v;
    VIEWS.forEach(function(x){ $("v-"+x).classList.toggle("hidden", x !== v); });
    window.scrollTo(0,0);
    if(tg && tg.BackButton){
      if(v === "home" || v === "fav" || v === "search" || v === "guide") tg.BackButton.hide();
      else tg.BackButton.show();
    }
    document.querySelectorAll(".tab").forEach(function(t){
      var active = (t.dataset.tab === v) || (v === "list" && t.dataset.tab === "home")
                || (v === "detail" && t.dataset.tab === "home" && backTo === "list");
      t.classList.toggle("on", active);
    });
  }
  function goBack(){
    if(view === "detail") { if(backTo==="fav") showFav(); if(backTo==="search") showSearch(); go(backTo); }
    else if(view === "list") go("home");
    else go("home");
  }
  function refreshCurrent(){
    if(view === "fav") showFav();
    else if(view === "search") showSearch();
    else if(view === "list") { var b=$("listBox"); b.innerHTML = Array.prototype.map.call(b.children, function(){return "";}).join(""); showList(); }
    else if(view === "detail") { var id = $("detBox").querySelector("[data-fav]").dataset.fav; openDetail(id); }
  }

  if(tg && tg.BackButton) tg.onEvent("backButtonClicked", goBack);
  $("listBack").onclick = goBack;
  $("detBack").onclick = goBack;

  $("goBtn").onclick = function(){ haptic('medium'); showList(); };
  $("randBtn").onclick = function(){
    haptic('heavy');
    var pool = MIXES;
    if(sel.strength) pool = MIXES.filter(function(m){ return m.strength === sel.strength; });
    if(!pool.length) pool = MIXES;
    backTo = "home";
    openDetail(pool[Math.floor(Math.random()*pool.length)].id);
  };

  document.querySelectorAll(".tab").forEach(function(t){
    t.onclick = function(){
      haptic();
      var v = t.dataset.tab;
      if(v === "fav") showFav();
      if(v === "search") showSearch();
      if(v === "guide") showGuide();
      go(v);
    };
  });

  go("home");
})();
</script>
</body>
</html>
